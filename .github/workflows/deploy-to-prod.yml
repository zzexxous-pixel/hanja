name: 운영 서버(hanja) 원터치 수동 배포
on:
  workflow_dispatch: # 깃허브 Actions 탭에 수동 배포 버튼 생성

jobs:
  deploy-to-prod:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - name: 1. 테스트 저장소 소스코드 무결성 동기화
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 히스토리를 통째로 넘기기 위해 이력을 모두 가져옵니다.

    - name: 2. Node.js 가상 환경 런타임 구축
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: 3. 플레이라이트 구동용 패키지 초경량 설치
      run: npm install

    - name: 4. 가상 브라우저(크롬) 엔진 및 종속성 완벽 빌드
      run: npx playwright install --with-deps chromium

    - name: 5. 🔥 운영 이관 전 10대 철벽 시나리오 최종 전수 검증
      run: npx playwright test

    # 🚀 [제2 방어선] 파일 복사가 아닌, 검증이 끝난 현재 Git 히스토리 전체를 운영 레포로 통째로 강제 푸시합니다.
    - name: 6. 테스트 통과 완료본 운영(hanja) 저장소로 무결성 원터치 배포
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # 운영 레포지토리를 production 원격지로 등록
        git remote add production https://${{ secrets.SYNC_TOKEN }}@github.com/zzexxous-pixel/hanja.git
        
        # 💡 현재 테스트 레포의 완전히 검증된 main 브랜치 이력(History)을 운영 레포로 강제 푸시(Force Push)합니다.
        # 이 한 줄 덕분에 운영 서버가 무결한 버전 번호와 업데이트 시간을 그대로 계승하게 됩니다.
        git push production main:main --force