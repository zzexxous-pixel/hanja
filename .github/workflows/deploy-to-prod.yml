name: 운영 서버(hanja) 원터치 수동 배포
on:
  workflow_dispatch: # 💡 깃허브 웹 Actions 탭에 안전한 수동 배포 버튼을 생성합니다.

jobs:
  deploy-to-prod:
    timeout-minutes: 10
    runs-on: ubuntu-latest # 최신 안정화 리눅스 배포판 환경 컴퓨터 가동
    steps:
    - name: 1. 테스트 저장소 소스코드 무결성 동기화
      uses: actions/checkout@v4

    - name: 2. Node.js 가상 환경 런타임 구축
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: 3. 플레이라이트 구동용 패키지 초경량 설치
      run: npm install

    - name: 4. 가상 브라우저(크롬) 엔진 및 종속성 완벽 빌드
      run: npx playwright install --with-deps chromium

    # 🛑 [제1 방어선] 배포 버튼을 눌렀더라도 10대 시나리오 중 단 하나라도 실패하면
    # 이 단계에서 서버가 즉시 멈추며 하단의 배포 로직을 실행하지 않고 가동 중단됩니다.
    - name: 5. 🔥 운영 이관 전 10대 철벽 시나리오 최종 전수 검증
      run: npx playwright test

    # 🚀 [제2 방어선] 검증이 완벽히 끝난 알맹이 파일만 선별하여 운영 레포지토리로 안전하게 밀어 넣습니다.
    - name: 6. 테스트 통과 완료본 운영(hanja) 저장소로 무결성 원터치 배포
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # SYNC_TOKEN 마스터키를 사용하여 실제 운영 서버 저장소를 임시 공간에 가져옵니다.
        git clone https://${{ secrets.SYNC_TOKEN }}@github.com/zzexxous-pixel/hanja.git ../hanja_prod
        
        # 💡 [핵심 최적화] 깃 이력(.git)과 다운로드된 패키지(node_modules), 임시 리포트는 빼고 순수 개발 소스만 완벽하게 복사합니다.
        rsync -av --delete \
          --exclude='.git/' \
          --exclude='node_modules/' \
          --exclude='test-results/' \
          --exclude='playwright-report/' \
          ./ ../hanja_prod/
        
        # 운영 저장소 공간으로 이동하여 배포 커밋을 안전하게 생성합니다.
        cd ../hanja_prod
        git add .
        
        # 변경 사항이 전혀 없을 때 배포 파이프라인이 터지는 현상을 예방합니다.
        git commit -m "Release: hanja-test 무결성 검증 완료본 수동 승인 배포" || echo "변경 사항 없음"
        
        # 💡 [핵심 실패 방지] 수동 복사로 인해 뒤엉킨 Git 히스토리 충돌을 원천 차단하기 위해 
        # 테스트 저장소의 완벽한 상태를 운영 서버의 main 브랜치에 강제로 일치(--force)시켜 배포를 완수합니다.
        git push origin main --force