<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음성 인식 및 발음 유사도 분석 샘플 (연속 가속 버전)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
        }
        /* 한자 카드 펄스 효과와 동일한 가시적 효과를 위한 애니메이션 클래스 */
        .mic-pulse-active {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 select-none">

<div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-6 border border-gray-200">
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">🎙️ 발음 유사도 판정 테스트기</h1>
        <p class="text-xs text-gray-500 mt-1">0ms 웜업 풀 및 실시간 스트림 매칭 엔진이 적용된 고도화 버전입니다.</p>
    </div>

    <div class="mb-5">
        <label class="block text-sm font-semibold text-gray-700 mb-1">🎯 맞추고 싶은 목표 단어</label>
        <input type="text" id="target-word" value="대한민국" 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center text-lg font-bold"
               placeholder="예: 대한민국, 사과">
        <p class="text-[11px] text-gray-400 mt-1 text-center">목표 단어를 바꾸고 테스트해볼 수 있습니다.</p>
    </div>

    <div class="mb-6">
        <button id="mic-btn" 
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-md touch-none">
            <span id="mic-icon">🎤</span>
            <span id="btn-text">누른 채로 말하기 (Hold)</span>
        </button>
    </div>

    <div class="space-y-4">
        <div class="bg-gray-50 rounded-xl p-4 border border-gray-100 text-center">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">실시간 판정 결과</h3>
            <p id="match-status" class="text-lg font-bold text-gray-600 mt-1">대기 중...</p>
            <div class="mt-2 text-sm text-gray-500">
                발음 일치율: <span id="similarity-percentage" class="font-extrabold text-indigo-600">--%</span>
            </div>
            <p class="text-[11px] text-gray-400 mt-1">💡 한자 앱 규칙: 손을 대고 말하는 도중 60%를 넘으면 즉시 합격!</p>
        </div>

        <div class="bg-slate-900 rounded-xl p-3 text-left font-mono flex flex-col">
            <div class="text-[10px] text-gray-400 border-b border-gray-700 pb-1 mb-1 font-bold flex justify-between select-none">
                <span>📡 시스템 실시간 스트림</span>
                <span class="text-[9px] text-slate-500 font-normal">↕ 우측 하단을 드래그하여 높이 조절 가능</span>
            </div>
            <div id="stream-log" class="text-xs text-emerald-400 break-words h-48 min-h-[100px] max-h-[600px] overflow-y-auto resize-y space-y-1 pr-1">
                <div class="text-slate-500">// 여기에 타임스탬프 기반 시스템 상태 로그가 차곡차곡 쌓입니다.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // === 한글 자모 분해 및 발음 유사도 판정 알고리즘 ===
    const CHOSUNG = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const JUNGSEONG = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const JONGSEONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄴㅈ","ㄴㅎ","ㄷ","ㄹ","ㄹㄱ","ㄹㅁ","ㄹㅂ","ㄹㅅ","ㄹㅌ","ㄹㅍ","ㄹㅎ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

    function disassembleKorean(str) {
        let result = "";
        for (let i = 0; i < str.length; i++) {
            const charCode = str.charCodeAt(i);
            if (charCode >= 44032 && charCode <= 55203) {
                const hangulCode = charCode - 44032;
                const choIndex = Math.floor(hangulCode / 588);
                const jungIndex = Math.floor((hangulCode - (choIndex * 588)) / 28);
                const jongIndex = hangulCode % 28;
                result += CHOSUNG[choIndex] + JUNGSEONG[jungIndex] + JONGSEONG[jongIndex];
            } else {
                if (str[i] !== ' ') {
                    result += str[i];
                }
            }
        }
        return result;
    }

    function getLevenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1,
                        Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1)
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }

    function calculatePhoneticSimilarity(wordA, wordB) {
        const jamoA = disassembleKorean(wordA);
        const jamoB = disassembleKorean(wordB);
        const maxLength = Math.max(jamoA.length, jamoB.length);
        if (maxLength === 0) return 1.0;
        const distance = getLevenshteinDistance(jamoA, jamoB);
        return 1 - (distance / maxLength);
    }

    // === 상태 관리 변수 ===
    let isListening = false;               
    let isPressing = false;                
    let hasPassed = false;                 
    let micShutdownTimer = null;           
    let currentSpeechStartIndex = -1;      
    let recognition = null;

    // [변경] 한자 플랫폼 스펙의 고성능 타임스탬프형 누적형 로그 엔진 변환 바인딩
    function logToStream(category, message) {
        const consoleBody = document.getElementById("stream-log");
        if (!consoleBody) return;

        // 실시간 한국시(KST) 시간 포맷 획득 (HH:MM:SS)
        const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        const logLine = document.createElement('div');
        logLine.className = 'py-0.5 border-b border-slate-800/40 break-all text-[11px] leading-relaxed';
        
        let colorClass = 'text-emerald-400';
        if (category === 'Error') colorClass = 'text-rose-400';
        if (category === 'Success') colorClass = 'text-cyan-400';
        if (category === 'System') colorClass = 'text-amber-400';
        // [요청] 유저 목소리로 인식되어 추출된 텍스트 계열 데이터는 핫핑크(Fuchsia) 계열로 명확하게 차별 색상 격리
        if (category === 'Speech') colorClass = 'text-fuchsia-400 font-extrabold'; 

        logLine.innerHTML = `<span class="text-slate-500">[${time}]</span> <span class="${colorClass}">[${category}]</span> ${message}`;
        
        consoleBody.appendChild(logLine);
        
        // 메모리 절약: 누적 로그 라인이 150개를 넘어가면 순차 선입선출 파괴 처리
        if (consoleBody.children.length > 150) {
            consoleBody.removeChild(consoleBody.firstChild);
        }
        // 새 로그 적재 즉시 하단 스트림 자동 고정 스크롤
        consoleBody.scrollTop = consoleBody.scrollHeight;
    }

    // 5초간 추가 입력이 없으면 백그라운드 마이크 세션을 안전하게 정리하는 회수기 함수
    function startMicShutdownTimer() {
        if (micShutdownTimer) clearTimeout(micShutdownTimer);
        micShutdownTimer = setTimeout(() => {
            if (recognition && isListening) {
                try {
                    recognition.stop();
                    logToStream('System', "⏱️ 5초 대기 만료: 마이크 인프라 자원을 자동으로 안전 회수했습니다.");
                } catch (err) {
                    console.error(err);
                }
                isListening = false;
            }
            micShutdownTimer = null;
        }, 5000);
    }

    // 인터페이스 뷰 스타일 전환 함수
    function setRecordingUI(active) {
        const btn = document.getElementById("mic-btn");
        const btnText = document.getElementById("btn-text");
        const micIcon = document.getElementById("mic-icon");

        if (active) {
            btn.classList.replace("bg-indigo-600", "bg-rose-500");
            btn.classList.replace("hover:bg-indigo-700", "hover:bg-rose-600");
            btn.classList.add("mic-pulse-active");
            btnText.textContent = "듣고 있습니다.. 말씀하세요!";
            micIcon.textContent = "🛑";
        } else {
            btn.classList.replace("bg-rose-500", "bg-indigo-600");
            btn.classList.replace("hover:bg-rose-600", "hover:bg-indigo-700");
            btn.classList.remove("mic-pulse-active");
            btnText.textContent = "누른 채로 말하기 (Hold)";
            micIcon.textContent = "🎤";
        }
    }

    // === Web Speech API 연속 가속 매칭 엔진 구성 ===
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ko-KR';
        recognition.continuous = true;     
        recognition.interimResults = true;  
        recognition.maxAlternatives = 1;

        // 마이크 인식 오디오 주파수 신호 유입 리스너 연동
        recognition.onsoundstart = function() {
            logToStream('System', "🎤 하드웨어 인터페이스 단으로 오디오 유입 감지됨");
        };

        // 구글 서버 및 디바이스 오디오 채널이 소리를 들을 준비가 완벽히 완료된 시점 싱크업
        recognition.onstart = function() {
            isListening = true;
            if (isPressing) {
                setRecordingUI(true);
                document.getElementById("match-status").innerHTML = "<span class='text-blue-500 font-bold'>👂 실시간 음성 스트림 분석 중...</span>";
                logToStream('System', "🎙️ 구글 클라우드 오디오 게이트웨이 개방 완료.");
            }
        };

        recognition.onresult = function(event) {
            if (!isListening) return;
            if (hasPassed) return; 

            if (currentSpeechStartIndex === -1) {
                currentSpeechStartIndex = event.resultIndex;
            }

            let currentTranscript = '';
            for (let i = currentSpeechStartIndex; i < event.results.length; ++i) {
                currentTranscript += event.results[i][0].transcript;
            }

            let isFinalResult = event.results[event.results.length - 1].isFinal;

            if (currentTranscript) {
                const targetWord = document.getElementById("target-word").value.trim();
                const cleanSpoken = currentTranscript.replace(/[\.\?\!\,\s]+/g, '');
                const cleanTarget = targetWord.replace(/\s+/g, '');

                const similarity = calculatePhoneticSimilarity(cleanSpoken, cleanTarget);
                const percentScore = Math.round(similarity * 100);

                document.getElementById("similarity-percentage").textContent = `${percentScore}%`;

                if (similarity >= 0.6) {
                    hasPassed = true;
                    document.getElementById("match-status").innerHTML = `
                        <span class="text-emerald-500 font-black">🎉 즉시 통과! (딩동댕)</span>
                        <div class="text-xs text-gray-500 mt-1">인식: "${currentTranscript}" ≒ 목표: "${targetWord}"</div>
                    `;
                    // [변경] 음성인식 확인 출력 카테고리를 'Speech' 토큰으로 매핑하여 차별 색상 가동
                    logToStream('Success', `🎯 매칭 성공! 최종 일치율: ${percentScore}%`);
                    logToStream('Speech', `실시간 합격 확정 버퍼 ➡️ "${cleanSpoken}"`);
                    
                    startMicShutdownTimer();
                } 
                else if (isFinalResult) {
                    document.getElementById("match-status").innerHTML = `
                        <span class="text-red-500 font-bold">😢 아쉬워요! 다시 해보세요.</span>
                        <div class="text-xs text-gray-500 mt-1">최종 확정된 발음: "${currentTranscript}"</div>
                    `;
                    logToStream('Error', `❌ 판정 낙방 일치율: ${percentScore}% (기준치 미달)`);
                    logToStream('Speech', `불합격 프레임 수집 버퍼 ➡️ "${cleanSpoken}"`);
                    startMicShutdownTimer();
                } 
                else {
                    if (isPressing) {
                        // 실시간 매칭 진행 상황 출력 스트림 색상 차별화 연동
                        logToStream('Speech', `인식 중: "${cleanSpoken}" (실시간 매칭 점수: ${percentScore}%)`);
                    }
                }
            }
        };

        recognition.onend = function() {
            isListening = false;
            setRecordingUI(false);
            if (micShutdownTimer) {
                clearTimeout(micShutdownTimer);
                micShutdownTimer = null;
            }
            logToStream('System', "💤 마이크 채널 대기 세션 가동 종료 ➡️ Idle 전환 완료");
        };

        recognition.onerror = function(event) {
            isListening = false;
            setRecordingUI(false);
            if (micShutdownTimer) {
                clearTimeout(micShutdownTimer);
                micShutdownTimer = null;
            }
            if (event.error === 'aborted') {
                logToStream('System', "🔄 연속 입력을 위해 오디오 스트림 채널 파이프라인이 재정렬되었습니다.");
                return;
            }
            logToStream('Error', `🚨 하드웨어 인프라 에러 감지: ${event.error}`);
        };
    } else {
        setTimeout(() => {
            document.getElementById("match-status").innerHTML = "<span class='text-red-500 font-bold'>⚠️ 현재 사용 중인 브라우저는 음성인식을 지원하지 않습니다. (Chrome 추천)</span>";
        }, 100);
    }

    // === 0ms 무전기식 연속 홀드 다운 제어 파이프라인 ===
    function handlePressStart() {
        if (!recognition) return;

        isPressing = true;
        hasPassed = false;
        currentSpeechStartIndex = -1; 

        if (micShutdownTimer) {
            clearTimeout(micShutdownTimer);
            micShutdownTimer = null;
        }

        if (isListening) {
            setRecordingUI(true);
            document.getElementById("match-status").innerHTML = "<span class='text-blue-500 font-bold'>👂 웜업 지속 가동 중! 즉시 말씀하세요.</span>";
            document.getElementById("similarity-percentage").textContent = "--%";
            logToStream('System', "🚀 개방된 기존 스트림 채널을 재활용합니다. (대기 지연 0ms 바이패스 완료)");
        } else {
            document.getElementById("match-status").innerHTML = "<span class='text-amber-500 font-bold'>⌛ 오디오 채널 동기화 연결 중...</span>";
            document.getElementById("similarity-percentage").textContent = "--%";
            try {
                recognition.start();
            } catch (err) {
                console.error(err);
            }
        }
    }

    function handlePressEnd() {
        if (!isPressing) return;
        isPressing = false;

        setRecordingUI(false);

        if (isListening) {
            logToStream('System', "📥 버튼을 놓았습니다. 마이크 채널 무결성을 유지하며 5초 Keep-Alive 풀 작동 개시.");
            startMicShutdownTimer();
        }
    }

    // === 버튼 이벤트 정밀 바인딩 ===
    const micBtn = document.getElementById("mic-btn");
    
    micBtn.addEventListener("mousedown", handlePressStart);
    micBtn.addEventListener("mouseup", handlePressEnd);
    micBtn.addEventListener("mouseleave", handlePressEnd); 

    micBtn.addEventListener("touchstart", function(e) {
        e.preventDefault(); 
        handlePressStart();
    }, { passive: false });
    
    micBtn.addEventListener("touchend", function(e) {
        e.preventDefault();
        handlePressEnd();
    }, { passive: false });
</script>

</body>
</html>
