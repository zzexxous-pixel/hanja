<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음성 인식 연속 가속 테스트 컴포넌트 (완성형 프로토타입)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모든 텍스트 영역의 자유로운 마우스 드래그 복사 허용 */
        .selectable-log {
            user-select: text !important;
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
        }

        /* State 2, 3: 마이크 활성화 시 빨간색 펄스 */
        @keyframes mic-border-pulse {
            0%, 100% { border-color: #fca5a5; background-color: #fef2f2; }
            50% { border-color: #ef4444; background-color: #fee2e2; }
        }
        .mic-pulse-active {
            animation: mic-border-pulse 1.2s infinite ease-in-out !important;
        }

        /* State 4: 손떼기 후 백그라운드 채점 중일 때의 노란색 펄스 */
        @keyframes checking-border-pulse {
            0%, 100% { border-color: #fde68a; background-color: #fefdf0; }
            50% { border-color: #f59e0b; background-color: #fffbeb; }
        }
        .checking-pulse-active {
            animation: checking-border-pulse 0.9s infinite ease-in-out !important;
        }

        /* State 5: 정답 및 오답 확정 시 고정 배경 컬러 */
        .btn-final-correct { background-color: #22c55e !important; border-color: #16a34a !important; }
        .btn-final-incorrect { background-color: #ef4444 !important; border-color: #dc2626 !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen p-6 flex flex-col items-center select-none">

<div class="max-w-5xl w-full bg-white shadow-md p-6 border border-gray-300 flex flex-col gap-4">
    
    <h1 class="text-xl font-bold text-gray-800 border-b pb-2">🎙️ 발음 유사도 판정 테스트기 (Concise Build)</h1>

    <div class="flex gap-3 w-full">
        <div class="flex items-center gap-2 flex-grow">
            <span class="text-sm font-semibold text-gray-600 whitespace-nowrap">🎯 목표 단어:</span>
            <input type="text" id="target-word" value="대한민국" 
                   class="w-full px-3 py-2 border border-gray-300 rounded font-bold text-lg text-center focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        <button id="mic-btn" 
                class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 border border-transparent text-white font-bold px-8 py-2 rounded transition shadow-sm touch-none whitespace-nowrap min-w-[240px]">
            🎤 누른 채로 말하기 (Hold)
        </button>
    </div>

    <div class="w-full">
        <label class="block text-xs font-bold text-gray-500 mb-1">📋 실시간 판정 결과 누적 (버튼 누를 때 초기화 / 손 떼기 전까지 표출 차단)</label>
        <textarea id="match-status-box" rows="5" readonly 
                  class="w-full p-2 border border-gray-300 rounded font-mono text-xs bg-gray-50 text-gray-700 focus:outline-none selectable-log leading-relaxed shadow-inner"></textarea>
    </div>

    <div class="w-full">
        <div class="text-xs font-bold text-gray-500 mb-1 flex justify-between">
            <span>📡 시스템 실시간 스트림 (최신 15줄 유지)</span>
            <span class="text-[10px] text-gray-400 font-normal">↕ 우측 하단 모서리를 잡고 드래그하여 높이 조절 가능</span>
        </div>
        <div id="stream-log" class="w-full p-2 border border-gray-300 rounded font-mono text-xs bg-slate-950 text-emerald-400 overflow-y-auto resize-y min-h-[120px] h-[240px] space-y-0.5 selectable-log">
            <div class="text-slate-500">// 마이크 가동 내역 및 자모음 매칭 세부 데이터가 이곳에 적재됩니다.</div>
        </div>
    </div>

</div>

<script>
    // === 한글 자모 분해 및 발음 유사도 판정 알고리즘 ===
    const CHOSUNG = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    const JUNGSEONG = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
    const JONGSEONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄴㅈ","ㄴㅎ","ㄷ","ㄹ","ㄹㄱ","ㄹㅁ","ㄹㅂ","ㄹㅅ","ㄹㅌ","ㄹㅍ","ㄹㅎ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

    function disassembleKorean(str) {
        let result = "";
        for (let i = 0; i < str.length; i++) {
            const charCode = str.charCodeAt(i);
            if (charCode >= 44032 && charCode <= 55203) {
                const hangulCode = charCode - 44032;
                const choIndex = Math.floor(hangulCode / 588);
                const jungIndex = Math.floor((hangulCode - (choIndex * 588)) / 28);
                const jongIndex = hangulCode % 28;
                result += CHOSUNG[choIndex] + JUNGSEONG[jungIndex] + JONGSEONG[jongIndex];
            } else {
                if (str[i] !== ' ') result += str[i];
            }
        }
        return result;
    }

    function getLevenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1,
                        Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1)
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }

    // 자모 분해 후 레벤슈타인 거리를 활용해 0.0 ~ 1.0 사이의 소수점을 도출합니다.
    function calculatePhoneticSimilarity(wordA, wordB) {
        const jamoA = disassembleKorean(wordA);
        const jamoB = disassembleKorean(wordB);
        const maxLength = Math.max(jamoA.length, jamoB.length);
        if (maxLength === 0) return 1.0;
        const distance = getLevenshteinDistance(jamoA, jamoB);
        return 1 - (distance / maxLength);
    }

    // ➡️ [추가] 음절 단위 분해 함수 (초성, 중성, 종성 구조화)
    function disassembleToSyllables(str) {
        let result = [];
        for (let i = 0; i < str.length; i++) {
            const charCode = str.charCodeAt(i);
            if (charCode >= 44032 && charCode <= 55203) {
                const hangulCode = charCode - 44032;
                const choIndex = Math.floor(hangulCode / 588);
                const jungIndex = Math.floor((hangulCode - (choIndex * 588)) / 28);
                const jongIndex = hangulCode % 28;
                result.push({
                    cho: CHOSUNG[choIndex],
                    jung: JUNGSEONG[jungIndex],
                    jong: JONGSEONG[jongIndex]
                });
            } else {
                if (str[i] !== ' ') result.push({ cho: str[i], jung: '', jong: '' });
            }
        }
        return result;
    }

    // ➡️ [추가] 종성 감점 완화(0.2점)가 반영된 음절 단위 편집 거리 계산 알고리즘
    function calculateWeightedSimilarity(wordA, wordB) {
        const arrA = disassembleToSyllables(wordA);
        const arrB = disassembleToSyllables(wordB);
        const maxLength = Math.max(arrA.length, arrB.length);
        if (maxLength === 0) return 1.0;

        const matrix = [];
        for (let i = 0; i <= arrB.length; i++) matrix[i] = [i * 2.2]; // 음절 삭제 최대 비용 (1+1+0.2)
        for (let j = 0; j <= arrA.length; j++) matrix[0][j] = j * 2.2; // 음절 삽입 최대 비용

        for (let i = 1; i <= arrB.length; i++) {
            for (let j = 1; j <= arrA.length; j++) {
                const sA = arrA[j - 1];
                const sB = arrB[i - 1];

                // 자모별 가중치 차등 분기
                let subCost = 0;
                if (sA.cho !== sB.cho) subCost += 1.0;     // 초성 틀림: 1.0 감점
                if (sA.jung !== sB.jung) subCost += 1.0;   // 중성 틀림: 1.0 감점
                if (sA.jong !== sB.jong) subCost += 0.2;   // 종성 틀림/누락: 0.2 감점 완화 가이드 적용

                matrix[i][j] = Math.min(
                    matrix[i - 1][j - 1] + subCost,
                    matrix[i][j - 1] + 2.2,
                    matrix[i - 1][j] + 2.2
                );
            }
        }
        const maxWeight = maxLength * 2.2;
        return 1 - (matrix[arrB.length][arrA.length] / maxWeight);
    }

    // === 상태 관리 변수 ===
    let isListening = false;               
    let isPressing = false;                
    let hasPassed = false;                 
    let micShutdownTimer = null;           
    let currentSpeechStartIndex = -1;      
    let recognition = null;

    // 중복 문자열 결합 방지용 격리 세션 변수
    let speechBaselineText = "";           
    let lastTranscriptPerIndex = {};       
    let latestRawTranscript = "";          

    // Web Audio API 사운드 합성 제어 변수
    let audioCtx = null;
    let forcedTimeoutTimer = null; 

    // [요청] 3행 판정 결과 누적용 전용 연동 덤프 함수 (시간, 인식 단어, 일치율, 정답/오답 결과)
    function appendEvalResult(spoken, normalSim, weightedSim, resultLabel) {
        const resultBox = document.getElementById("match-status-box");
        const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        const normalScore = Math.round(normalSim * 100);
        const weightedScore = Math.round(weightedSim * 100);
        
        // 두 방식의 일치율 점수를 투명하게 대조 출력
        const newLine = `[${time}] 인식: "${spoken}" | 일반 채점: ${normalScore}% | 종성보정(0.2): ${weightedScore}% | 결과: ${resultLabel}\n`;
        resultBox.value += newLine;
        resultBox.scrollTop = resultBox.scrollHeight; 
    }

    // [요청] 4행 타임스탬프 누적 로그 스트림 함수 (최신 15줄 규격 보존)
    function logToStream(category, message) {
        const consoleBody = document.getElementById("stream-log");
        if (!consoleBody) return;

        const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        const logLine = document.createElement('div');
        logLine.className = 'py-0.5 border-b border-slate-900/40 break-all selectable-log';
        
        let colorClass = 'text-emerald-400';
        if (category === 'Error') colorClass = 'text-rose-400';
        if (category === 'Success') colorClass = 'text-cyan-400';
        if (category === 'System') colorClass = 'text-amber-400';
        if (category === 'Speech') colorClass = 'text-fuchsia-400 font-bold'; 

        logLine.innerHTML = `<span class="text-slate-500">[${time}]</span> <span class="${colorClass}">[${category}]</span> ${message}`;
        consoleBody.appendChild(logLine);
        
        if (consoleBody.children.length > 15) {
            consoleBody.removeChild(consoleBody.firstChild);
        }
        consoleBody.scrollTop = consoleBody.scrollHeight;
    }

    // 5초 자동 백그라운드 세션 자원회수 스케줄러
    function startMicShutdownTimer() {
        if (micShutdownTimer) clearTimeout(micShutdownTimer);
        micShutdownTimer = setTimeout(() => {
            if (recognition && isListening) {
                try {
                    recognition.stop();
                    logToStream('System', "⏱️ 5초 대기 만료: 백그라운드 마이크 파이프라인 자원을 회수했습니다.");
                } catch (err) {
                    console.error(err);
                }
                isListening = false;
            }
            micShutdownTimer = null;
        }, 5000);
    }

    // [요청] Web Audio API 0ms 지연 기계식 주파수 사운드 이펙터
    function playSound(type) {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const now = audioCtx.currentTime;
            
            if (type === 'correct') {
                // 정답음: 짧게 '띵동' - Sine 파형 높은 아르페지오 (C5 ➡️ E5 변이 가속)
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // 도 (C5)
                osc.frequency.setValueAtTime(659.25, now + 0.08); // 미 (E5)
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.005, now + 0.25);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'incorrect') {
                // 오답음: 짧게 낮은음으로 '삐빕' - Triangle 파형 연속 2회 단발 사운드
                const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                osc1.type = 'triangle'; osc1.frequency.setValueAtTime(160, now);
                gain1.gain.setValueAtTime(0.2, now); gain1.gain.exponentialRampToValueAtTime(0.005, now + 0.07);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(now); osc1.stop(now + 0.08);

                const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                osc2.type = 'triangle'; osc2.frequency.setValueAtTime(160, now + 0.1);
                gain2.gain.setValueAtTime(0.2, now + 0.1); gain2.gain.exponentialRampToValueAtTime(0.005, now + 0.17);
                osc2.connect(gain2); gain2.connect(audioCtx.destination);
                osc2.start(now + 0.1); osc2.stop(now + 0.18);
            }
        } catch (err) {
            console.error("오디오 합성 오류:", err);
        }
    }

    // [요청] 기획 전용 제어 버튼 기반 6단계 상태 머신 UI 변환기
    function updateStateUI(state, passType) {
        const btn = document.getElementById("mic-btn");
        
        // 가동 중이던 모든 상태 스타일 클래스 및 펄스 효과 완전 회수
        btn.className = "text-white font-bold px-8 py-2 rounded transition shadow-sm touch-none whitespace-nowrap min-w-[240px]";
        btn.classList.remove('mic-pulse-active', 'checking-pulse-active', 'btn-final-correct', 'btn-final-incorrect');

        if (state === 'idle') {
            btn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'active:bg-blue-800');
            btn.innerHTML = `🎤 누른 채로 말하기 (Hold)`;
        } else if (state === 'touch') {
            // State 1: 터치 개시 (연결 수립 대기)
            btn.classList.add('bg-amber-500');
            btn.innerHTML = `<span class="text-white">⏳ 연결 중...</span>`;
        } else if (state === 'active') {
            // State 2, 3: 마이크 개방 및 발음 대기 (빨간 마이크 지정 사양 완수)
            btn.classList.add('bg-rose-100', 'text-rose-700', 'border-rose-400', 'mic-pulse-active');
            btn.innerHTML = `<i class="fa-solid fa-microphone text-red-500 animate-pulse"></i> 🎙️ 녹음 중...`;
        } else if (state === 'checking') {
            // State 4: 손을 뗐으나 잔여 오디오 프레임 파싱 대기 중 (연필 아이콘 및 노란색 펄스)
            btn.classList.add('bg-amber-500', 'checking-pulse-active');
            btn.innerHTML = `✏️ 채점 중...`;
        } else if (state === 'final') {
            // State 5: 결산 확정 (텍스트 제거, 순수 녹색 O, 빨간색 X 아이콘 단독 출력)
            if (passType === 'correct') {
                btn.classList.add('btn-final-correct');
                btn.innerHTML = `<span class="text-white text-lg font-black">⭕</span>`;
            } else if (passType === 'incorrect') {
                btn.classList.add('btn-final-incorrect');
                btn.innerHTML = `<span class="text-white text-lg font-black">❌</span>`;
            }
        }
    }

    // 정답/오답 최종 결산 처리기
    function executeFinalDecision(isCorrect) {
        if (forcedTimeoutTimer) {
            clearTimeout(forcedTimeoutTimer);
            forcedTimeoutTimer = null;
        }

        const targetWord = document.getElementById("target-word").value.trim();
        const cleanSpoken = latestRawTranscript || "인식 불가";
        const cleanTarget = targetWord.replace(/\s+/g, '');
        const cleanSpokenRef = cleanSpoken.replace(/[\.\?\!\,\s]+/g, '');

        // 일반 평면 거리 방식과 종성 가중치 방식 스냅샷 동시 추출
        const normalSim = calculatePhoneticSimilarity(cleanSpokenRef, cleanTarget);
        const weightedSim = calculateWeightedSimilarity(cleanSpokenRef, cleanTarget);

        if (isCorrect || weightedSim >= 0.6) { // 종성 보정 점수가 60% 이상이면 합격 승인
            playSound('correct');
            updateStateUI('final', 'correct');
            appendEvalResult(cleanSpoken, normalSim, weightedSim, "⭕ 맞아요!");
            logToStream('Success', `🎯 정답 판정 완수 (일반: ${Math.round(normalSim*100)}% / 보정: ${Math.round(weightedSim*100)}%)`);
        } else {
            playSound('incorrect');
            updateStateUI('final', 'incorrect');
            appendEvalResult(cleanSpoken, normalSim, weightedSim, "❌ 아니에요.");
            logToStream('Error', `❌ 최종 불합격 마감 (보정 점수 미달: ${Math.round(weightedSim * 100)}%)`);
        }
    }

    // === Web Speech API 연속 가속 분석 엔진 빌드 ===
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ko-KR';
        recognition.continuous = true;     
        recognition.interimResults = true;  
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
            isListening = true;
            if (isPressing) {
                updateStateUI('active');
                logToStream('System', "🎙️ 구글 클라우드 오디오 세션 게이트 개방 완료.");
            }
        };

        recognition.onresult = function(event) {
            if (!isListening) return;
            if (hasPassed) return; 

            if (currentSpeechStartIndex === -1) {
                currentSpeechStartIndex = event.resultIndex;
                speechBaselineText = lastTranscriptPerIndex[currentSpeechStartIndex] || "";
            }

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                lastTranscriptPerIndex[i] = event.results[i][0].transcript;
            }

            let localTranscript = event.results[currentSpeechStartIndex][0].transcript;
            if (speechBaselineText && localTranscript.startsWith(speechBaselineText)) {
                localTranscript = localTranscript.slice(speechBaselineText.length);
            }

            let currentTranscript = localTranscript;
            for (let i = currentHanjaSpeechStartIndex + 1; i < event.results.length; ++i) {
                currentTranscript += event.results[i][0].transcript;
            }

            currentTranscript = currentTranscript.trim();
            let isFinalResult = event.results[event.results.length - 1].isFinal;

            if (currentTranscript) {
                latestRawTranscript = currentTranscript;

                const targetWord = document.getElementById("target-word").value.trim();
                const cleanSpoken = currentTranscript.replace(/[\.\?\!\,\s]+/g, '');
                const cleanTarget = targetWord.replace(/\s+/g, '');

                // 실시간 상태 추적용 대조 점수 계산
                const normalSim = calculatePhoneticSimilarity(cleanSpoken, cleanTarget);
                const weightedSim = calculateWeightedSimilarity(cleanSpoken, cleanTarget);

                if (weightedSim >= 0.6) { // 하이패스 정답 조기 도과 기준을 보정형 알고리즘으로 대체
                    hasPassed = true;
                    playSound('correct'); 
                    logToStream('Success', `🎯 [보정 통과] 음성 입력 도중 정답 도달 (일반: ${Math.round(normalSim*100)}% / 보정: ${Math.round(weightedSim*100)}%)`);
                    if (!isPressing) {
                        executeFinalDecision(true);
                    }
                    startMicShutdownTimer();
                } else if (isFinalResult) {
                    logToStream('Speech', `클라우드 최종 프레임 수신됨 (일치율: ${Math.round(similarity * 100)}%)`);
                    // 버튼에서 이미 손을 뗐고 채점 대기 중인 경우 최종 낙방 처리 확정
                    if (!isPressing && !hasPassed) {
                        executeFinalDecision(false);
                    }
                } else {
                    if (isPressing) {
                        logToStream('Speech', `🎙️ 실시간 분석 중: "${cleanSpoken}" (현재 일치율: ${Math.round(similarity * 100)}%)`);
                    }
                }
            }
        };

        recognition.onend = function() {
            isListening = false;
            if (micShutdownTimer) {
                clearTimeout(micShutdownTimer);
                micShutdownTimer = null;
            }
            logToStream('System', "💤 마이크 스트림 세션 마감 ➡️ Idle 전환");
        };

        recognition.onerror = function(event) {
            isListening = false;
            updateStateUI('idle');
            if (event.error === 'aborted') {
                logToStream('System', "🔄 고속 연속 연타 대응용 채널 파이프 정렬 완료.");
                return;
            }
            logToStream('Error', `🚨 하드웨어 인프라 장애: ${event.error}`);
        };
    }

    // === 0ms 무전기식 연속 홀드 다운 제어 파이프라인 ===
    function handlePressStart() {
        if (!recognition) return;

        isPressing = true;
        hasPassed = false;
        
        currentSpeechStartIndex = -1; 
        speechBaselineText = "";
        latestRawTranscript = ""; 

        // [요청 사양] 누른 채로 말하기 버튼을 누르는 즉시 3행 결과 영역 완전 초기화 청소
        document.getElementById("match-status-box").value = "";

        if (micShutdownTimer) {
            clearTimeout(micShutdownTimer);
            micShutdownTimer = null;
        }
        if (forcedTimeoutTimer) {
            clearTimeout(forcedTimeoutTimer);
            forcedTimeoutTimer = null;
        }

        if (isListening) {
            updateStateUI('active');
            logToStream('System', "🚀 웜업 가동 중인 기존 채널 즉시 바인딩. (대기 지연 0ms 바이패스)");
        } else {
            updateStateUI('touch');
            logToStream('System', "⌛ 최초 채널 동기화 핸드셰이크 가동");
            try {
                recognition.start();
            } catch (err) {
                console.error(err);
            }
        }
    }

    function handlePressEnd() {
        if (!isPressing) return;
        isPressing = false;

        // [4단계 사양] 손을 떼었을 때 이미 정답 플래그가 참이면 즉시 매핑 처리
        if (hasPassed) {
            executeFinalDecision(true);
        } else {
            // 아직 정답에 도달하지 못했다면 잔여 패킷을 위해 1.2초 채점 완충 지대 기동
            updateStateUI('checking');
            logToStream('System', "📥 버튼 홀드 종료 ➡️ State 4: 채점 세션 진입 (1.2초 강제 마감 타이머 작동)");
            
            if (forcedTimeoutTimer) clearTimeout(forcedTimeoutTimer);
            forcedTimeoutTimer = setTimeout(() => {
                if (!hasPassed) {
                    // 1.2초 만료 순간까지 정답 미달 시 최종 오답으로 강제 판정 탕!
                    executeFinalDecision(false);
                }
            }, 1200);
        }

        if (isListening) {
            startMicShutdownTimer();
        }
    }

    // === 물리적 이벤트 정밀 하드 바인딩 ===
    const micBtn = document.getElementById("mic-btn");
    
    micBtn.addEventListener("mousedown", handlePressStart);
    micBtn.addEventListener("mouseup", handlePressEnd);
    micBtn.addEventListener("mouseleave", handlePressEnd); 

    micBtn.addEventListener("touchstart", function(e) {
        e.preventDefault(); 
        handlePressStart();
    }, { passive: false });
    
    micBtn.addEventListener("touchend", function(e) {
        e.preventDefault();
        handlePressEnd();
    }, { passive: false });
</script>

</body>
